# ==========================================
# Food Ordering System — Docker Compose
# ==========================================
# Usage:
#   docker-compose up -d          (start all services)
#   docker-compose down           (stop all services)
#   docker-compose logs -f        (view live logs)
#   docker-compose up -d --build  (rebuild and start)

services:
  # --- PostgreSQL Database ---
  db:
    image: postgres:16-alpine
    container_name: foodorder-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: food_ordering
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- NestJS Backend API ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: foodorder-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@db:5432/food_ordering?schema=public
      JWT_SECRET: super-secret-jwt-key-change-in-production
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/graphql?query=%7B__typename%7D" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # --- Next.js Frontend ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_GRAPHQL_URL: http://localhost:3000/graphql
    container_name: foodorder-frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
